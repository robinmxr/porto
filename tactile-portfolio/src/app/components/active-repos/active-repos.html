<div class="bg-surface-container-lowest/60 backdrop-blur-xl p-8 rounded-xl border border-white/5 clay-high-depth w-72 hover:border-white/10 transition-colors duration-500">
  <div class="flex justify-between items-center mb-6">
    <h4 class="font-label text-xs uppercase tracking-widest text-on-surface hover:text-[#9fa7ff] transition-colors cursor-default">ls ./projects</h4>
    <span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
  </div>
  <div class="space-y-4">
    @for (repo of repos; track repo.name) {
      <div class="group cursor-pointer hover:bg-surface/40 p-2 -mx-2 rounded-lg transition-colors duration-300">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined {{ repo.baseColor }} group-hover:scale-110 group-hover:drop-shadow-md transition-all">{{ repo.icon }}</span>
          <div>
            <div class="text-xs font-bold text-on-surface uppercase {{ repo.hoverColor }} transition-colors">{{ repo.name }}</div>
            <div class="text-[10px] text-on-surface-variant font-label">{{ repo.tags }}</div>
          </div>
        </div>
      </div>
    }
  </div>
  <div class="mt-8 pt-4 border-t border-outline-variant/20 group cursor-crosshair">
    <pre class="text-[9px] text-primary/60 font-mono leading-tight group-hover:text-primary transition-colors">{{ '{' }}
  "status": "active_sync",
  "repos": {{ repos.length }},
  "load": 0.08
{{ '}' }}</pre>
  </div>
</div>
