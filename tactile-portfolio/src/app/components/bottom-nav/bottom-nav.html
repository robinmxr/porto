<nav [class]="isMobile ? 'fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] z-[100]' : 'fixed bottom-0 left-0 w-full z-50 flex justify-center pb-8 pointer-events-none'">
  
  <!-- MOBILE TACTILE KEYPAD -->
  <div *ngIf="isMobile" class="rounded-[2.5rem] bg-[#080808] border-t border-white/10 border-x border-white/5 p-2 shadow-[0_20px_50px_rgba(0,0,0,0.8),inset_0_2px_10px_rgba(255,255,255,0.05)] flex items-center justify-around gap-2">
    
    <!-- KEY 1: HOME -->
    <a routerLink="/" 
       routerLinkActive="key-active" 
       [routerLinkActiveOptions]="{exact: true}"
       class="relative flex-1 group">
      <div class="h-16 rounded-2xl bg-[#0f0f0f] border border-white/5 flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-[4px_4px_10px_rgba(0,0,0,0.4),-2px_-2px_5px_rgba(255,255,255,0.02)] group-[.key-active]:shadow-[inset_2px_2px_8px_rgba(0,0,0,0.8),inset_-1px_-1px_4px_rgba(255,255,255,0.02)] group-[.key-active]:bg-black">
        <div class="absolute top-2 w-1.5 h-1.5 rounded-full bg-primary/20 group-[.key-active]:bg-primary group-[.key-active]:shadow-[0_0_8px_#9fa7ff] transition-all duration-500"></div>
        <span class="material-symbols-outlined text-2xl text-slate-500 group-[.key-active]:text-primary transition-colors" data-icon="terminal">terminal</span>
      </div>
    </a>

    <!-- KEY 2: EXPERIENCE -->
    <a routerLink="/experience" 
       routerLinkActive="key-active"
       class="relative flex-1 group">
      <div class="h-16 rounded-2xl bg-[#0f0f0f] border border-white/5 flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-[4px_4px_10px_rgba(0,0,0,0.4),-2px_-2px_5px_rgba(255,255,255,0.02)] group-[.key-active]:shadow-[inset_2px_2px_8px_rgba(0,0,0,0.8),inset_-1px_-1px_4px_rgba(255,255,255,0.02)] group-[.key-active]:bg-black">
        <div class="absolute top-2 w-1.5 h-1.5 rounded-full bg-secondary/20 group-[.key-active]:bg-secondary group-[.key-active]:shadow-[0_0_8px_#c180ff] transition-all duration-500"></div>
        <span class="material-symbols-outlined text-2xl text-slate-500 group-[.key-active]:text-secondary transition-colors" data-icon="history">history</span>
      </div>
    </a>

    <!-- KEY 3: PROJECTS -->
    <a routerLink="/projects" 
       routerLinkActive="key-active"
       class="relative flex-1 group">
      <div class="h-16 rounded-2xl bg-[#0f0f0f] border border-white/5 flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-[4px_4px_10px_rgba(0,0,0,0.4),-2px_-2px_5px_rgba(255,255,255,0.02)] group-[.key-active]:shadow-[inset_2px_2_8px_rgba(0,0,0,0.8),inset_-1px_-1px_4px_rgba(255,255,255,0.02)] group-[.key-active]:bg-black">
        <div class="absolute top-2 w-1.5 h-1.5 rounded-full bg-tertiary/20 group-[.key-active]:bg-tertiary group-[.key-active]:shadow-[0_0_8px_#c6fff3] transition-all duration-500"></div>
        <span class="material-symbols-outlined text-2xl text-slate-500 group-[.key-active]:text-tertiary transition-colors" data-icon="folder_open">folder_open</span>
      </div>
    </a>

    <!-- KEY 4: BIO -->
    <a routerLink="/bio" 
       routerLinkActive="key-active"
       class="relative flex-1 group">
      <div class="h-16 rounded-2xl bg-[#0f0f0f] border border-white/5 flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-[4px_4px_10px_rgba(0,0,0,0.4),-2px_-2px_5px_rgba(255,255,255,0.02)] group-[.key-active]:shadow-[inset_2px_2px_8px_rgba(0,0,0,0.8),inset_-1px_-1px_4px_rgba(255,255,255,0.02)] group-[.key-active]:bg-black">
        <div class="absolute top-2 w-1.5 h-1.5 rounded-full bg-primary/20 group-[.key-active]:bg-primary group-[.key-active]:shadow-[0_0_8px_#9fa7ff] transition-all duration-500"></div>
        <span class="material-symbols-outlined text-2xl text-slate-500 group-[.key-active]:text-primary transition-colors" data-icon="handshake">handshake</span>
      </div>
    </a>
  </div>

  <!-- DESKTOP NAV TEMPLATE -->
  <div *ngIf="!isMobile" class="rounded-full bg-[#0e0e0e]/40 backdrop-blur-2xl shadow-[0_-10px_40px_rgba(159,167,255,0.08)] mb-8 mx-auto w-fit flex items-center p-2 gap-2 border border-white/5 pointer-events-auto hover:border-primary/20 transition-colors duration-500">
    <a routerLink="/" 
       routerLinkActive="bg-[#9fa7ff]/20 text-[#9fa7ff] ring-[#9fa7ff]/30 shadow-[0_0_10px_rgba(159,167,255,0.2)] md:shadow-[0_0_20px_rgba(159,167,255,0.2)] scale-105" 
       [routerLinkActiveOptions]="{exact: true}"
       class="text-slate-400 p-4 rounded-full ring-1 ring-transparent opacity-80 flex flex-col items-center gap-1 transition-all duration-300 hover:scale-110 hover:opacity-100 hover:text-white active:scale-90 font-label">
      <span class="material-symbols-outlined hover:drop-shadow-[0_0_8px_rgba(159,167,255,0.8)] transition-all" data-icon="terminal">terminal</span>
      <span class="font-label text-[10px] font-bold uppercase">whoami</span>
    </a>
    
    <a routerLink="/experience" 
       routerLinkActive="bg-[#9fa7ff]/20 text-[#9fa7ff] ring-[#9fa7ff]/30 shadow-[0_0_10px_rgba(159,167,255,0.2)] md:shadow-[0_0_20px_rgba(159,167,255,0.2)] scale-105"
       class="text-slate-400 p-4 rounded-full ring-1 ring-transparent opacity-80 flex flex-col items-center gap-1 transition-all duration-300 hover:scale-110 hover:opacity-100 hover:text-white active:scale-90 font-label">
      <span class="material-symbols-outlined" data-icon="history">history</span>
      <span class="font-label text-[10px] font-bold uppercase">./experience</span>
    </a>

    <a routerLink="/projects" 
       routerLinkActive="bg-[#9fa7ff]/20 text-[#9fa7ff] ring-[#9fa7ff]/30 shadow-[0_0_10px_rgba(159,167,255,0.2)] md:shadow-[0_0_20px_rgba(159,167,255,0.2)] scale-105"
       class="text-slate-400 p-4 rounded-full ring-1 ring-transparent opacity-80 flex flex-col items-center gap-1 transition-all duration-300 hover:scale-110 hover:opacity-100 hover:text-white active:scale-90 font-label">
      <span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
      <span class="font-label text-[10px] font-bold uppercase">./projects</span>
    </a>

    <a routerLink="/bio" 
       routerLinkActive="bg-[#9fa7ff]/20 text-[#9fa7ff] ring-[#9fa7ff]/30 shadow-[0_0_10px_rgba(159,167,255,0.2)] md:shadow-[0_0_20px_rgba(159,167,255,0.2)] scale-105"
       class="text-slate-400 p-4 rounded-full ring-1 ring-transparent opacity-80 flex flex-col items-center gap-1 transition-all duration-300 hover:scale-110 hover:opacity-100 hover:text-white active:scale-90 font-label">
      <span class="material-symbols-outlined" data-icon="handshake">handshake</span>
      <span class="font-label text-[10px] font-bold uppercase">contact.json</span>
    </a>
  </div>
</nav>
