<!-- MAIN APP CONTAINER -->
<ng-container *ngIf="viewport.isMobile(); else desktopLayout">
  <!-- MOBILE VIEW -->
  <div class="mobile-scaffold relative w-screen h-screen flex flex-col overflow-hidden bg-[#0a0a0a] transition-all duration-700">
    <!-- SYSTEM OVERLAYS (SHARED) -->
    <div class="grid-bg fixed inset-0 z-[1] pointer-events-none opacity-10"></div>
    <div class="scanline fixed inset-0 z-[100] pointer-events-none opacity-40"></div>
    
    <!-- TRANSITION GLITCH -->
    <app-glitch-overlay [active]="isTransitioning()"></app-glitch-overlay>
    
    <!-- TOP BAR (COMPACT) -->
    <header class="h-16 flex items-center justify-between px-6 z-50 border-b border-primary/10 glass-panel">
      <h1 class="text-primary font-mono text-sm tracking-[0.2em] animate-pulse">CORE_SYS.MOBILE_V1</h1>
      <span class="material-symbols-outlined text-primary/40 text-sm">terminal</span>
    </header>

    <!-- CONTENT VIEWPORT -->
    <main class="flex-1 relative overflow-y-auto overflow-x-hidden hide-scrollbar py-6 pb-40 z-10" [@routeAnimations]="getRouteAnimationData()">
       <router-outlet></router-outlet>
    </main>

    <!-- FLOATING COMMAND CENTER (BOTTOM NAV) -->
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] z-[100]">
      <app-bottom-nav [isMobile]="true"></app-bottom-nav>
    </div>
  </div>
</ng-container>

<!-- DESKTOP TEMPLATE -->
<ng-template #desktopLayout>
  <!-- TOP APP BAR -->
  <app-top-nav class="z-50"></app-top-nav>

  <!-- SYSTEM OVERLAYS -->
  <div class="grid-bg fixed inset-0 z-[1] pointer-events-none opacity-20 transition-opacity duration-1000 group-hover:opacity-30"></div>
  <div class="scanline fixed inset-0 z-[100] pointer-events-none"></div>

  <!-- MAIN ROUTER VIEW -->
  <main class="relative w-screen h-screen overflow-hidden z-10" [@routeAnimations]="getRouteAnimationData()">
    <!-- SYSTEM TRACE LINES -->
    <div class="absolute inset-0 pointer-events-none z-0">
      <div class="trace-line absolute top-1/3 left-0 w-full"></div>
      <div class="trace-line absolute top-2/3 left-1/4 w-1/2"></div>
      <div class="v-trace-line absolute left-1/3 top-0 h-full"></div>
      <div class="v-trace-line absolute left-2/3 top-1/4 h-3/4"></div>
    </div>

    <!-- ROUTER INJECTION -->
    <div class="w-full h-full relative z-10">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- FLOATING COMMAND CENTER (BOTTOM NAV) -->
  <app-bottom-nav></app-bottom-nav>

  <!-- Background Decoration -->
  <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 opacity-20">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/10 blur-[120px] rounded-full"></div>
  </div>
</ng-template>

<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 opacity-20">
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-secondary/10 blur-[120px] rounded-full"></div>
</div>
